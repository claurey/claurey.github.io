<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Challenge Nº 1 | Article preview component</title>
  <link rel="stylesheet" href="./index_challenge1.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css" integrity="sha512-+4zCK9k+qNFUR5X+cKL9EIR+ZOhtIloNl9GIKS57V1MyNsYpYcUrUeQc9vNfzsWfV28IaLL3i96P9sdNyeRssA==" crossorigin="anonymous" />

</head>
<body>

  <div class="contenedor">
    <div class="contenedor__img">
    </div>
    <div class="contenedor__information">
      <div class="contenedor__h3">
        <h3>Shift the overall look and feel by adding these wonderful 
          touches to furniture in your home</h3>
      </div>
      <div class="contenedor__p"> 
        <p>Ever been in a room and felt like something was missing? Perhaps it felt slightly bare and uninviting. I’ve got some simple tips to help you make any room feel complete.</p>
      </div>
    <div class="contenedor__user">
        <div class="contenedor__datos">
          <div class="contenedor__user-foto">
            <img src="./images/avatar-michelle.jpg" alt="imagen-user" class="contenedor__img-user"/>
          </div>
          <div class="contenedor__datos-user">
            <h5>Michelle Appleton</h5>
            <p>28 Jun 2020</p>
          </div>
       </div>
        <button>
          <i class="fas fa-share"></i>
        </button>
        
      </div>
    </div>
  </div>

</body>
</html>
